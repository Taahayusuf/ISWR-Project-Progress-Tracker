                <div className="h-full rounded-full transition-all duration-1000 ease-out" style={{ width: `${Math.min(percentWDI, 100)}%`, backgroundColor: color }}></div>
              </div>
              <div className="grid grid-cols-3 gap-1.5 sm:gap-2 text-center">
                <div className="rounded-lg border border-slate-200 bg-slate-50/70 py-2 px-1.5 min-w-0">
                  <span className="block text-[8px] sm:text-[9px] text-slate-500 uppercase tracking-[0.06em] mb-0.5 font-medium">Total</span>
                  <span className="block text-[11px] sm:text-sm font-semibold text-slate-900 tabular-nums break-all">{target.toLocaleString()}</span>
                </div>
                <div className="rounded-lg border border-emerald-200 bg-emerald-50/80 py-2 px-1.5 min-w-0">
                  <span className="block text-[8px] sm:text-[9px] text-emerald-700 uppercase tracking-[0.06em] mb-0.5 font-medium">Done</span>
                  <span className="block text-[11px] sm:text-sm font-semibold text-emerald-700 tabular-nums break-all">{actual.toLocaleString()}</span>
                </div>
                <div className="rounded-lg border border-slate-200 bg-slate-50/70 py-2 px-1.5 min-w-0">
                  <span className="block text-[8px] sm:text-[9px] text-slate-500 uppercase tracking-[0.06em] mb-0.5 font-medium">Remain</span>
                  <span className={`block text-[11px] sm:text-sm font-semibold tabular-nums break-all ${remainingWDI > 0 ? 'text-red-600' : 'text-slate-900'}`}>{remainingWDI.toLocaleString()}</span>
                </div>
              </div>
            </div>

            {targetMt > 0 && (
              <div className="rounded-xl sm:rounded-2xl border border-slate-200/80 bg-white/80 p-2.5 min-w-0">
                <div className="flex items-center justify-between gap-2 mb-2 min-w-0">
                  <span className="text-[10px] font-semibold uppercase tracking-[0.08em] text-slate-600 break-words">Meter</span>
                  <span className="text-[10px] font-semibold text-slate-700 bg-slate-100 px-2 py-0.5 rounded-full">%{percentMT.toFixed(1)}</span>
                </div>
                <div className="w-full bg-slate-200/80 rounded-full h-1.5 mb-2.5 overflow-hidden">
                  <div className="h-full rounded-full transition-all duration-1000 ease-out" style={{ width: `${Math.min(percentMT, 100)}%`, backgroundColor: color }}></div>
                </div>
                <div className="grid grid-cols-3 gap-1.5 sm:gap-2 text-center">
                  <div className="rounded-lg border border-slate-200 bg-slate-50/70 py-2 px-1.5 min-w-0">
                    <span className="block text-[8px] sm:text-[9px] text-slate-500 uppercase tracking-[0.06em] mb-0.5 font-medium">Total</span>
                    <span className="block text-[11px] sm:text-sm font-semibold text-slate-900 tabular-nums break-all">{targetMt.toLocaleString()}</span>
                  </div>
                  <div className="rounded-lg border border-emerald-200 bg-emerald-50/80 py-2 px-1.5 min-w-0">
                    <span className="block text-[8px] sm:text-[9px] text-emerald-700 uppercase tracking-[0.06em] mb-0.5 font-medium">Done</span>
                    <span className="block text-[11px] sm:text-sm font-semibold text-emerald-700 tabular-nums break-all">{actualMt.toLocaleString()}</span>
                  </div>
                  <div className="rounded-lg border border-slate-200 bg-slate-50/70 py-2 px-1.5 min-w-0">
                    <span className="block text-[8px] sm:text-[9px] text-slate-500 uppercase tracking-[0.06em] mb-0.5 font-medium">Remain</span>
                    <span className={`block text-[11px] sm:text-sm font-semibold tabular-nums break-all ${remainingMT > 0 ? 'text-red-600' : 'text-slate-900'}`}>{remainingMT.toLocaleString()}</span>
                  </div>
                </div>
              </div>
            )}
          </div>

          {alert && (
            <div className="mt-3 text-center">
              <span className="inline-block text-[9px] sm:text-[10px] font-semibold text-red-700 bg-red-50/80 px-3 py-1.5 rounded-full border border-red-200 w-full tracking-[0.08em] sm:tracking-[0.16em] uppercase">Attention Required</span>
            </div>
          )}
        </div>
      );
    };

    const GaugeChart = ({ value, label }) => {
      const safeValue = Math.max(0, Math.min(value || 0, 2));
      const percent = Math.max(0, Math.min((safeValue / 2) * 100, 100));
      const angle = 180 * (safeValue / 2);
      const color = safeValue >= 1 ? '#10b981' : safeValue >= 0.95 ? '#f59e0b' : '#ef4444';
      const status = safeValue >= 1 ? 'Healthy' : safeValue >= 0.95 ? 'Watch' : 'Critical';
      return (
        <div className="flex flex-col items-center justify-center p-4">
          <div className="relative w-44 h-24 overflow-hidden">
            <div className="absolute inset-x-2 bottom-0 h-20 rounded-t-full bg-slate-100 border border-slate-200"></div>
            <div className="absolute inset-x-2 bottom-0 h-20 rounded-t-full border-8 border-slate-200 border-b-0"></div>
            <div className="absolute left-1/2 bottom-0 h-[78px] w-1 rounded-full origin-bottom -translate-x-1/2 bg-slate-700 shadow-sm transition-all duration-1000 ease-out" style={{ transform: `translateX(-50%) rotate(${Math.min(Math.max(angle - 90, -90), 90)}deg)` }}></div>
            <div className="absolute left-1/2 bottom-1.5 w-3.5 h-3.5 rounded-full -translate-x-1/2 border-2 border-white shadow" style={{ backgroundColor: color }}></div>
            <div className="absolute inset-x-0 bottom-6 flex justify-between px-2 text-[10px] font-semibold text-slate-400">
              <span>0.0</span>
              <span>1.0</span>
              <span>2.0</span>
            </div>
          </div>
          <div className="mt-3 text-center">
            <div className="inline-flex items-center gap-2 rounded-full border border-slate-200 bg-white px-2.5 py-1 text-[10px] font-bold uppercase tracking-[0.18em] text-slate-500">
              <span className="w-2 h-2 rounded-full" style={{ backgroundColor: color }}></span>
              {status}
            </div>
            <div className="mt-3 text-3xl font-black tracking-tight print-color-adjust" style={{ color }}>{safeValue.toFixed(2)}</div>
            <p className="text-xs text-slate-700 font-bold uppercase tracking-[0.18em] mt-1">{label}</p>
            <div className="mt-3 w-full max-w-[220px] mx-auto">
              <div className="flex justify-between text-[10px] font-semibold text-slate-500 mb-1">
                <span>Index Level</span>
                <span>{percent.toFixed(0)}%</span>
              </div>
              <div className="h-2 rounded-full bg-slate-100 overflow-hidden border border-slate-200">
                <div className="h-full rounded-full transition-all duration-1000 ease-out" style={{ width: `${percent}%`, background: `linear-gradient(90deg, ${color} 0%, ${color}cc 100%)` }}></div>
              </div>
            </div>
          </div>
        </div>
      );
    };

    // --- PIPING SECTION COMPONENT ---
    const PipingSection = () => {
      const mergedData = useMemo(() => (
        (pipingConsistency.weeklyTimeline || []).map((item) => {
          const shortDate = item.date ? item.date.split('-').slice(1).join(" '") : item.period;
          return {
            ...item,
            actualStation: item.stationActual,
            actualPipe: item.pipeActual,
            actualTank: item.tankActual,
            actualStationCum: item.stationActualCum,
            actualPipeCum: item.pipeActualCum,
            actualTankCum: item.tankActualCum,
            stationCum: item.stationCumPlan,
            pipeCum: item.pipeCumPlan,
            tankCum: item.tankActualCum,
            shortDate
          };
        })
      ), []);

      const formatChartValue = (value) => {
        if (value == null) return '';
        if (Math.abs(value) >= 1000) {
          const compact = Math.abs(value) >= 10000 ? (value / 1000).toFixed(0) : (value / 1000).toFixed(1);
          return `${compact.replace('.0', '')}k`;
        }
        return value.toLocaleString();
      };

      const createWeeklyLabelRenderer = (color = '#0f172a') => ({ x, y, width, value }) => {
        if (!value || value <= 0) return null;
        return (
          <text x={x + width / 2} y={y - 8} textAnchor="middle" fill={color} fontSize="10" fontWeight="800">
            {formatChartValue(value)}
          </text>
        );
      };

      const createCumulativeLabelRenderer = (color) => ({ x, y, value, index }) => {
        if (value == null) return null;
        const isLast = index === mergedData.length - 1;
        const shouldShow = isLast || index % 3 === 0;
        if (!shouldShow) return null;

        const label = formatChartValue(Math.round(value));
        const labelWidth = Math.max(30, label.length * 7 + 10);

        return (
          <g>
            <rect x={x - labelWidth / 2} y={y - 22} width={labelWidth} height={16} rx={5} fill="rgba(255,255,255,0.92)" stroke="rgba(148,163,184,0.35)" />
            <text x={x} y={y - 10} textAnchor="middle" fill={color} fontSize="10" fontWeight="800">
              {label}
            </text>
          </g>
        );
      };

      const reportDateLabel = useMemo(() => {
        const latestActualDate = pipingConsistency?.latestWeek?.date ? new Date(pipingConsistency.latestWeek.date) : new Date('2026-03-14');
        const safeDate = Number.isNaN(latestActualDate.getTime()) ? new Date('2026-03-14') : latestActualDate;
        return safeDate.toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' }).toUpperCase();
      }, []);

      const forecastData = useMemo(() => {
        const recentWeeks = pipingWeeklyActuals.slice(-5);
        const avgStation = recentWeeks.length ? recentWeeks.reduce((acc, curr) => acc + curr.station, 0) / recentWeeks.length : 0;
        const avgTank = recentWeeks.length ? recentWeeks.reduce((acc, curr) => acc + curr.tank, 0) / recentWeeks.length : 0;
        const avgPipe = recentWeeks.length ? recentWeeks.reduce((acc, curr) => acc + curr.pipeline, 0) / recentWeeks.length : 0;

        const remStation = Math.max(0, kpiData.station.target - kpiData.station.actual);
        const remTank = Math.max(0, kpiData.tank.target - kpiData.tank.actual);
        const remPipe = Math.max(0, kpiData.pipe.target - kpiData.pipe.actual);

        const weeksStation = avgStation > 0 ? Math.ceil(remStation / avgStation) : 999;
        const weeksTank = avgTank > 0 ? Math.ceil(remTank / avgTank) : 999;
        const weeksPipe = avgPipe > 0 ? Math.ceil(remPipe / avgPipe) : 999;
        const latestTimelineDate = mergedData.length ? new Date(mergedData[mergedData.length - 1].date) : new Date('2026-03-13');
        const currentDate = Number.isNaN(latestTimelineDate.getTime()) ? new Date('2026-03-13') : latestTimelineDate;

        const targetStationDate = new Date('2026-11-30');
        const targetTankDate = new Date('2026-10-30');
        const targetPipeDate = new Date('2026-08-30');

        const getWeeksToTarget = (target) => Math.max(1, Math.ceil((target - currentDate) / (1000 * 60 * 60 * 24 * 7)));

        const reqStation = Math.ceil(remStation / getWeeksToTarget(targetStationDate));
        const reqTank = Math.ceil(remTank / getWeeksToTarget(targetTankDate));
        const reqPipe = Math.ceil(remPipe / getWeeksToTarget(targetPipeDate));

        const getFinishDateStr = (weeks) => {
          if (weeks === 999) return 'Unknown';
          const date = new Date(currentDate.getTime());
          date.setDate(date.getDate() + (weeks * 7));
          return date.toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: '2-digit' });
        };

        return {
          station: { avg: Math.round(avgStation), rem: remStation, weeks: weeksStation, date: getFinishDateStr(weeksStation), targetDate: '30 Nov 26', required: reqStation },
          tank: { avg: Math.round(avgTank), rem: remTank, weeks: weeksTank, date: getFinishDateStr(weeksTank), targetDate: '30 Oct 26', required: reqTank },
          pipe: { avg: Math.round(avgPipe), rem: remPipe, weeks: weeksPipe, date: getFinishDateStr(weeksPipe), targetDate: '30 Aug 26', required: reqPipe }
        };
      }, []);

      const pipingExecutiveSummary = useMemo(() => {
        const recentWeeks = pipingWeeklyActuals.slice(-5);
        const previousWeeks = pipingWeeklyActuals.slice(-10, -5);
        const currentVelocity = recentWeeks.length ? recentWeeks.reduce((sum, item) => sum + item.totalWDI, 0) / recentWeeks.length : 0;
        const previousVelocity = previousWeeks.length ? previousWeeks.reduce((sum, item) => sum + item.totalWDI, 0) / previousWeeks.length : 0;
        const remaining = Math.max(0, kpiData.total.target - kpiData.total.actual);
        const weeksToFinish = currentVelocity > 0 ? Math.ceil(remaining / currentVelocity) : 999;
        const latestDate = mergedData.length ? new Date(mergedData[mergedData.length - 1].date) : new Date('2026-03-10');
        const safeDate = Number.isNaN(latestDate.getTime()) ? new Date('2026-03-10') : latestDate;
        const finishDate = new Date(safeDate.getTime());
        finishDate.setDate(finishDate.getDate() + (weeksToFinish === 999 ? 0 : weeksToFinish * 7));
        const targetDate = new Date('2026-10-30');
        const weeksToTarget = Math.max(1, Math.ceil((targetDate - safeDate) / (1000 * 60 * 60 * 24 * 7)));
        const requiredVelocity = Math.ceil(remaining / weeksToTarget);
        const paceRatio = requiredVelocity > 0 ? currentVelocity / requiredVelocity : 1;
        const trendDelta = currentVelocity - previousVelocity;
        const variance = kpiData.total.actual - kpiData.total.target;
        const status = paceRatio >= 1 ? 'On Track' : paceRatio >= 0.85 ? 'Recovery Needed' : 'At Risk';
        const statusClasses = status === 'On Track'
          ? 'bg-emerald-500/15 text-emerald-100 border-emerald-400/30'
          : status === 'Recovery Needed'
            ? 'bg-amber-500/15 text-amber-100 border-amber-400/30'
            : 'bg-rose-500/15 text-rose-100 border-rose-400/30';
        const chartData = pipingWeeklyActuals.slice(-8).map((item) => ({
          period: item.period,
          actual: item.totalWDI,
          required: requiredVelocity,
        }));
        const latestChartPoint = [...chartData].reverse().find((item) => item.actual > 0 || item.required > 0) || { period: '-', actual: 0, required: 0 };

        return {
          completionPct: kpiData.total.target ? (kpiData.total.actual / kpiData.total.target) * 100 : 0,
          remaining,
          currentVelocity,
          previousVelocity,
          requiredVelocity,
          trendDelta,
          variance,
          paceRatio,
          weeksToFinish,
          finishDateLabel: weeksToFinish === 999 ? 'Unknown' : finishDate.toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: '2-digit' }),
          targetDateLabel: targetDate.toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: '2-digit' }),
          status,
          statusClasses,
          chartData,
          latestChartPoint
        };
      }, [mergedData]);

      const executiveTooltipStyle = {
        backgroundColor: 'rgba(15, 23, 42, 0.96)',
        border: '1px solid rgba(148, 163, 184, 0.18)',
        borderRadius: '10px',
        color: '#e2e8f0',
        fontSize: '11px'
      };

      return (
        <div className="w-full bg-white rounded-[28px] shadow-sm border border-slate-200 p-4 sm:p-6 flex flex-col gap-4 sm:gap-5 print:border-none print:shadow-none print:p-0">
          <div className="flex flex-col sm:flex-row sm:justify-between sm:items-end gap-3 border-b-2 border-slate-900 pb-3 break-inside-avoid">
            <div className="flex items-center gap-3 min-w-0">
              <div className="bg-blue-600 p-2 rounded text-white shrink-0 print:bg-white print:text-blue-600 print:border print:border-blue-600"><i data-lucide="activity" style={{ width: 24, height: 24 }} /></div>
              <div className="min-w-0"><h1 className="text-xl sm:text-2xl font-bold uppercase tracking-tight text-slate-900 leading-none">Piping Report</h1><p className="text-sm text-slate-700 font-medium mt-1">Plan vs Actual Analysis</p></div>
            </div>
            <div className="flex items-center gap-3"><div className="bg-slate-100 px-3 py-1 rounded print:bg-white print:border print:border-slate-300"><p className="text-[10px] font-bold text-slate-700 uppercase">Report Date</p><p className="text-sm font-bold text-slate-900">{reportDateLabel}</p></div></div>
          </div>

          <div className="bg-gradient-to-br from-slate-950 via-slate-900 to-slate-800 rounded-[28px] p-4 sm:p-5 text-white shadow-lg break-inside-avoid border border-slate-800 overflow-hidden relative">
            <div className="absolute inset-0 bg-[radial-gradient(circle_at_top_right,rgba(59,130,246,0.18),transparent_35%),radial-gradient(circle_at_bottom_left,rgba(16,185,129,0.14),transparent_35%)]"></div>
            <div className="relative flex flex-col gap-4">
              <div className="flex flex-col lg:flex-row lg:items-end lg:justify-between gap-4">
                <div className="min-w-0">
                  <div className="text-[11px] uppercase tracking-[0.24em] text-slate-400 font-bold">Executive trajectory</div>
                  <h3 className="text-xl sm:text-2xl font-bold tracking-tight mt-2">Piping weekly delivery vs required pace</h3>
                  <p className="text-sm text-slate-300 mt-2 max-w-3xl">The strip lets the trend line tell the story first, with only the balance and forecast badges left for quick reading.</p>
                </div>
                <div className={`w-fit rounded-full border px-3 py-1.5 text-[11px] font-bold uppercase tracking-[0.18em] ${pipingExecutiveSummary.statusClasses}`}>
                  {pipingExecutiveSummary.status}
                </div>
              </div>

              <div className="grid grid-cols-1 xl:grid-cols-[minmax(0,2.4fr)_minmax(300px,1fr)] gap-4 items-stretch">
                <div className="rounded-[24px] border border-white/10 bg-slate-950/45 p-3 sm:p-4 print:bg-white print:border-slate-300 print:text-slate-900">
                  <div className="flex items-center justify-between gap-3 mb-3">
                    <div>
                      <div className="text-[10px] uppercase tracking-[0.16em] text-slate-400 print:text-slate-500 font-bold">Last 8 weeks</div>
                      <div className="text-sm font-semibold text-slate-200 print:text-slate-900 mt-1">Actual weekly WDI against the required recovery pace</div>
                    </div>
                    <div className={`text-xs font-bold ${pipingExecutiveSummary.trendDelta >= 0 ? 'text-emerald-300 print:text-emerald-700' : 'text-rose-300 print:text-rose-700'}`}>
                      {pipingExecutiveSummary.trendDelta >= 0 ? 'Trend improving' : 'Trend softening'}
                    </div>
                  </div>
                  <div className="h-52 sm:h-56 print:h-64">
                    <ResponsiveContainer width="100%" height="100%">
                      <ComposedChart data={pipingExecutiveSummary.chartData} margin={{ top: 8, right: 18, left: 6, bottom: 18 }}>
                        <CartesianGrid strokeDasharray="3 3" vertical={false} stroke="rgba(148,163,184,0.18)" />
                        <XAxis dataKey="period" stroke="#94a3b8" tick={{ fontSize: 11, fontWeight: 700, fill: '#cbd5e1' }} interval={0} angle={-35} textAnchor="end" height={44} />
                        <YAxis stroke="#94a3b8" tick={{ fontSize: 11, fill: '#cbd5e1' }} width={54} />
                        <Tooltip contentStyle={executiveTooltipStyle} formatter={(value, name) => [(Number(value) || 0).toLocaleString(), name === 'actual' ? 'Actual WDI' : 'Required WDI']} labelStyle={{ fontWeight: 'bold', color: '#f8fafc' }} />
                        <Bar dataKey="actual" name="actual" fill="#38bdf8" radius={[6, 6, 0, 0]} maxBarSize={24}>
                          <LabelList dataKey="actual" position="top" formatter={(value) => (Number(value) || 0).toLocaleString()} style={{ fill: '#e2e8f0', fontSize: 10, fontWeight: 700 }} />
                        </Bar>
                        <Line type="monotone" dataKey="required" name="required" stroke="#f9a8d4" strokeWidth={2.5} dot={{ r: 3, strokeWidth: 0, fill: '#f9a8d4' }} strokeDasharray="5 5" />
                      </ComposedChart>
                    </ResponsiveContainer>
                  </div>
                  <div className="mt-3 hidden print:flex items-center justify-between text-[11px] text-slate-700">
                    <span>Latest shown week: {pipingExecutiveSummary.latestChartPoint.period}</span>
                    <span>Actual {Number(pipingExecutiveSummary.latestChartPoint.actual || 0).toLocaleString()} WDI · Required {Number(pipingExecutiveSummary.latestChartPoint.required || 0).toLocaleString()} WDI</span>
                  </div>
                  <div className="mt-3 hidden print:block overflow-hidden rounded-xl border border-slate-300 bg-white shadow-sm">
                    <table className="w-full text-[10px] text-slate-800">
                      <thead className="bg-slate-200/90">
                        <tr>
                          <th className="px-2 py-1.5 text-left font-bold border-b border-slate-300 text-slate-900">Week</th>
                          <th className="px-2 py-1.5 text-right font-bold border-b border-slate-300 text-slate-900">Actual WDI</th>
                          <th className="px-2 py-1.5 text-right font-bold border-b border-slate-300 text-slate-900">Required WDI</th>
                        </tr>
                      </thead>
                      <tbody>
                        {pipingExecutiveSummary.chartData.map((row, idx) => (
                          <tr key={row.period} className={idx % 2 === 0 ? 'bg-white' : 'bg-slate-50'}>
                            <td className="px-2 py-1 border-b border-slate-200">{row.period}</td>
                            <td className="px-2 py-1 border-b border-slate-200 text-right tabular-nums">{Number(row.actual || 0).toLocaleString()}</td>
                            <td className="px-2 py-1 border-b border-slate-200 text-right tabular-nums">{Number(row.required || 0).toLocaleString()}</td>
                          </tr>
                        ))}
                      </tbody>
                    </table>
                  </div>
                </div>
                <div className="grid grid-cols-2 gap-3">
                  <div className="rounded-2xl border border-white/10 bg-white/5 px-4 py-3">
                    <div className="text-[10px] uppercase tracking-[0.16em] text-slate-400 font-bold">Completion</div>
                    <div className="mt-2 text-2xl font-black tabular-nums text-white">{pipingExecutiveSummary.completionPct.toFixed(1)}%</div>
                    <div className="mt-1 text-xs text-slate-300">of {Math.round(kpiData.total.target).toLocaleString()} WDI scope</div>
                  </div>
                  <div className="rounded-2xl border border-white/10 bg-white/5 px-4 py-3">
                    <div className="text-[10px] uppercase tracking-[0.16em] text-slate-400 font-bold">Remaining</div>
                    <div className="mt-2 text-2xl font-black tabular-nums text-amber-300">{Math.round(pipingExecutiveSummary.remaining).toLocaleString()}</div>
                    <div className="mt-1 text-xs text-slate-300">Open WDI balance</div>
                  </div>
                  <div className="rounded-2xl border border-white/10 bg-white/5 px-4 py-3 col-span-2">
                    <div className="flex items-center justify-between gap-3 text-sm">
                      <span className="text-slate-300">Current vs required pace</span>
                      <span className={`font-bold ${pipingExecutiveSummary.paceRatio >= 1 ? 'text-emerald-300' : pipingExecutiveSummary.paceRatio >= 0.85 ? 'text-amber-300' : 'text-rose-300'}`}>{(pipingExecutiveSummary.paceRatio * 100).toFixed(0)}%</span>
                    </div>
                    <div className="mt-2 h-2 rounded-full bg-white/10 overflow-hidden">
                      <div className={`h-full rounded-full ${pipingExecutiveSummary.paceRatio >= 1 ? 'bg-emerald-400' : pipingExecutiveSummary.paceRatio >= 0.85 ? 'bg-amber-400' : 'bg-rose-400'}`} style={{ width: `${Math.max(8, Math.min(pipingExecutiveSummary.paceRatio * 100, 100))}%` }}></div>
                    </div>
                    <div className="mt-3 grid grid-cols-2 gap-3 text-xs">
                      <div>
                        <div className="text-slate-400">Current pace</div>
                        <div className="mt-1 font-bold text-sky-300 text-base tabular-nums">{Math.round(pipingExecutiveSummary.currentVelocity).toLocaleString()}</div>
                      </div>
                      <div>
                        <div className="text-slate-400">Required pace</div>
                        <div className="mt-1 font-bold text-fuchsia-300 text-base tabular-nums">{Math.round(pipingExecutiveSummary.requiredVelocity).toLocaleString()}</div>
                      </div>

          {/* OVERALL PROGRESS SUMMARY */}
          <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 mb-8 break-inside-avoid">
            {[
              { title: "Internal Blasting", done: donIntBlast, total: totIntBlast, color: "blue" },
              { title: "Internal Lining", done: donIntLin, total: totIntLin, color: "indigo" },
              { title: "External Blasting", done: donExtBlast, total: totExtBlast, color: "emerald" },
              { title: "External Coating", done: donExtCoat, total: totExtCoat, color: "teal" }
            ].map((metric, i) => {
              const p = parseFloat(pct(metric.done, metric.total));
              const colorClasses = {
                blue: { chip: 'bg-blue-50 text-blue-700 border-blue-200', text: 'text-blue-700', rail: 'bg-blue-500' },
                indigo: { chip: 'bg-indigo-50 text-indigo-700 border-indigo-200', text: 'text-indigo-700', rail: 'bg-indigo-500' },
                emerald: { chip: 'bg-emerald-50 text-emerald-700 border-emerald-200', text: 'text-emerald-700', rail: 'bg-emerald-500' },
                teal: { chip: 'bg-teal-50 text-teal-700 border-teal-200', text: 'text-teal-700', rail: 'bg-teal-500' }
              }[metric.color];

              return (
                <div key={i} className="rounded-[22px] border border-slate-200 bg-white p-4 shadow-sm h-full">
                  <div className="flex items-start justify-between gap-3 mb-3">
                    <div>
                      <div className="text-[10px] uppercase tracking-[0.22em] text-slate-400 font-semibold">Scope</div>
                      <div className="text-lg font-semibold tracking-[-0.02em] text-slate-950 mt-1">{metric.title}</div>
                    </div>
                    <span className={`inline-flex items-center rounded-full border px-2.5 py-1 text-[10px] font-bold uppercase tracking-[0.18em] ${colorClasses.chip}`}>Progress</span>
                  </div>
                  <div className="rounded-2xl border border-slate-200 bg-slate-50/85 px-4 py-3 mb-2.5">
                    <div className="flex items-end justify-between gap-3">
                      <div>
                        <div className="text-[10px] uppercase tracking-[0.18em] text-slate-500 font-semibold">Completion</div>
                        <div className={`text-4xl font-semibold tracking-[-0.04em] tabular-nums mt-1 leading-none ${colorClasses.text}`}>{p.toFixed(0)}%</div>
                      </div>
                      <div className="text-right">
                        <div className="text-[10px] uppercase tracking-[0.18em] text-slate-400 font-semibold">Remaining</div>
                        <div className="text-base font-semibold tabular-nums mt-1 text-slate-700">{(metric.total - metric.done).toLocaleString()}</div>
                      </div>
                    </div>
                  </div>
                  <div className="grid grid-cols-2 gap-2 mb-2.5">
                    <div className="rounded-2xl border border-slate-200 bg-white px-3 py-2">
                      <div className="text-[10px] uppercase tracking-[0.16em] text-slate-400 font-semibold">Done</div>
                      <div className="text-sm font-semibold text-slate-950 tabular-nums mt-1">{metric.done.toLocaleString()}</div>
                    </div>
                    <div className="rounded-2xl border border-slate-200 bg-white px-3 py-2">
                      <div className="text-[10px] uppercase tracking-[0.16em] text-slate-400 font-semibold">Total</div>
                      <div className="text-sm font-semibold text-slate-950 tabular-nums mt-1">{metric.total.toLocaleString()}</div>
                    </div>
                  </div>
                  <div className="h-1.5 rounded-full bg-slate-100 overflow-hidden">
                    <div className={`h-full rounded-full ${colorClasses.rail}`} style={{ width: `${Math.max(0, Math.min(p, 100))}%` }}></div>
                  </div>
                </div>
              );
            })}
          </div>

          {/* TANK-BY-TANK VISUAL ANALYTICS */}
          <div className="mb-8">
            <div className="flex items-center justify-between gap-4 mb-2">
              <h3 className="text-base font-bold text-slate-900 flex items-center gap-2"><i data-lucide="bar-chart3" style={{ width: 18, height: 18 }} className="text-slate-600" /> Tank Painting Analytics</h3>
              <div className="rounded-full border border-slate-200 bg-slate-50 px-3 py-1 text-[11px] font-bold text-slate-600">Grouped by tank type</div>
            </div>
            <div className="border-b border-slate-100 pb-2"></div>

            <div className="space-y-6 break-inside-avoid">
              {[{ name: "Strategic Tanks", tanks: paintingTanks.filter(t => t.name.startsWith("TANK-") && !isNaN(t.name.split("-")[1])), tagColor: "bg-blue-500" },
                { name: "Operational Tanks", tanks: paintingTanks.filter(t => ["TANK-A", "TANK-B", "TANK-C"].includes(t.name)), tagColor: "bg-emerald-500" },
                { name: "Buffer Tanks", tanks: paintingTanks.filter(t => t.name.includes("BUFFER")), tagColor: "bg-purple-500" }
              ].map(group => (
                <div key={group.name} className="animate-fade-in">
                  <div className="flex items-center gap-2 mb-3">
                    <span className={`w-3 h-3 rounded-full ${group.tagColor}`}></span>
                    <h4 className="text-sm font-black text-slate-800 uppercase tracking-widest">{group.name}</h4>
                  </div>
                  
                  <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-3 print:grid-cols-3 break-inside-avoid">
                    {group.tanks.map((t, idx) => {
                      const buildBar = (label, done, total, colorBase) => {
                        const prog = total > 0 ? (done / total * 100) : 0;
                        return (
                          <div className="mb-1.5 last:mb-0">
                            <div className="flex justify-between items-end mb-0.5">
                              <span className="text-xs font-bold text-slate-700">{label}</span>
                              <span className="text-[10px] font-bold text-slate-500">{done.toLocaleString()} <span className="text-slate-300">/</span> {total.toLocaleString()}</span>
                            </div>
                            <div className="w-full bg-slate-200 rounded-full h-[8px] relative overflow-hidden">
                              <div className={`absolute top-0 left-0 h-full rounded-full bg-${colorBase}-500 transition-all duration-700`} style={{ width: `${Math.max(prog, 0)}%` }}></div>
                              {prog >= 100 && <div className="absolute top-0 left-0 w-full h-full bg-white opacity-20"></div>}
                            </div>
                            <div className="text-[10px] text-right font-black mt-0.5 text-slate-500 leading-none">{prog.toFixed(0)}%</div>
                          </div>
                        );
                      };

                      return (
                        <div key={idx} className={`bg-white rounded-lg border p-3 shadow-sm hover:shadow-md transition-shadow relative overflow-hidden ${t.status === 'critical' ? 'border-red-300' : 'border-slate-200'}`}>
                          <div className="flex justify-between items-start mb-2 border-b border-slate-100 pb-2">
                            <div>
                              <div className="font-extrabold text-slate-900 text-base tracking-tight leading-tight">{t.name}</div>
                              <div className="text-[10px] uppercase tracking-wider text-slate-500 font-bold mt-0.5">{group.name === 'Buffer Tanks' ? '16,000 m³' : (group.name === 'Operational Tanks' ? '167,000 m³' : '181,870 m³')}</div>
                            </div>
                          </div>

                          <div className="space-y-0.5">
                            {buildBar('Int. Blast', t.intBlastDone, t.intBlastTotal, 'blue')}
                            {buildBar('Int. Line', t.intLinDone, t.intLinTotal, 'indigo')}
                            {buildBar('Ext. Blast', t.extBlastDone, t.extBlastTotal, 'emerald')}
                            {buildBar('Ext. Coat', t.extCoatDone, t.extCoatTotal, 'teal')}
                          </div>
                        </div>
                      )
                    })}
                  </div>
                </div>
              ))}
            </div>
          </div>

          {/* CHARTS */}
          <div className="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-8">
            <div className="border border-slate-200 rounded-lg p-4 break-inside-avoid">
              <h4 className="text-sm font-bold text-slate-900 mb-4">Internal Coating Progress</h4>
              <div className="h-[250px]">
                <ResponsiveContainer width="99%" minHeight={250} aspect={2}>
                  <BarChart data={paintingTanks} margin={{ top: 5, right: 10, left: 0, bottom: 0 }}>
                    <CartesianGrid strokeDasharray="3 3" vertical={false} stroke="#e2e8f0" />
                    <XAxis dataKey="name" tick={{ fontSize: 11 }} stroke="#64748b" interval="preserveStartEnd" minTickGap={14} />
                    <YAxis tick={{ fontSize: 11 }} />
                    <Tooltip contentStyle={{ fontSize: '12px', borderRadius: '4px' }} cursor={{ fill: 'transparent' }} />
                    <Legend wrapperStyle={{ fontSize: '10px', paddingTop: '6px' }} />
                    <Bar dataKey="intBlastTotal" name="Blasting Scope" fill="#e2e8f0" maxBarSize={40} />
                    <Bar dataKey="intBlastDone" name="Blasting Done" fill="#3b82f6" maxBarSize={40} />
                  </BarChart>
                </ResponsiveContainer>
              </div>
            </div>
            <div className="border border-slate-200 rounded-lg p-4 break-inside-avoid">
              <h4 className="text-sm font-bold text-slate-900 mb-4">External Coating Progress</h4>
              <div className="h-[250px]">
                <ResponsiveContainer width="99%" minHeight={250} aspect={2}>
                  <BarChart data={paintingTanks} margin={{ top: 5, right: 10, left: 0, bottom: 0 }}>
                    <CartesianGrid strokeDasharray="3 3" vertical={false} stroke="#e2e8f0" />
                    <XAxis dataKey="name" tick={{ fontSize: 11 }} stroke="#64748b" interval="preserveStartEnd" minTickGap={14} />
                    <YAxis tick={{ fontSize: 11 }} />
                    <Tooltip contentStyle={{ fontSize: '12px', borderRadius: '4px' }} cursor={{ fill: 'transparent' }} />
                    <Legend wrapperStyle={{ fontSize: '10px', paddingTop: '6px' }} />
                    <Bar dataKey="extCoatTotal" name="Coating Scope" fill="#e2e8f0" maxBarSize={40} />
                    <Bar dataKey="extCoatDone" name="Coating Done" fill="#0d9488" maxBarSize={40} />
                  </BarChart>
                </ResponsiveContainer>
              </div>
            </div>
          </div>


        </div>
      );
    };



    // --- COVER COMPONENT ---

                      <span>Erection {Number(tankLatestExecutivePoint.erectionTon || 0).toLocaleString()} ton · Welding {Number(tankLatestExecutivePoint.weldingM || 0).toLocaleString()} m</span>
                    </div>
                    <div className="mt-3 hidden print:block overflow-hidden rounded-xl border border-slate-300 bg-white shadow-sm">
                      <table className="w-full text-[10px] text-slate-800">
                        <thead className="bg-slate-200/90">
                          <tr>
                            <th className="px-2 py-1.5 text-left font-bold border-b border-slate-300 text-slate-900">Week</th>
                            <th className="px-2 py-1.5 text-right font-bold border-b border-slate-300 text-slate-900">Erection ton</th>
                            <th className="px-2 py-1.5 text-right font-bold border-b border-slate-300 text-slate-900">Welding m</th>
                          </tr>
                        </thead>
                        <tbody>
                          {tankExecutiveChartData.map((row, idx) => (
                            <tr key={row.period} className={idx % 2 === 0 ? 'bg-white' : 'bg-slate-50'}>
                              <td className="px-2 py-1 border-b border-slate-200">{row.period}</td>
                              <td className="px-2 py-1 border-b border-slate-200 text-right tabular-nums">{Number(row.erectionTon || 0).toLocaleString()}</td>
                              <td className="px-2 py-1 border-b border-slate-200 text-right tabular-nums">{Number(row.weldingM || 0).toLocaleString()}</td>
                            </tr>
                          ))}
                        </tbody>
                      </table>
                    </div>
                  </div>
                  <div className="grid grid-cols-2 gap-3">
                    <div className="rounded-2xl border border-white/10 bg-white/5 px-4 py-3">
                      <div className="text-[10px] uppercase tracking-[0.16em] text-slate-400 font-bold">Erection complete</div>
                      <div className="mt-2 text-2xl font-black tabular-nums text-cyan-300">{tankSummary.totalErect ? ((tankSummary.actualErect / tankSummary.totalErect) * 100).toFixed(1) : '0.0'}%</div>
                      <div className="mt-1 text-xs text-slate-300">of erection scope</div>
                    </div>
                    <div className="rounded-2xl border border-white/10 bg-white/5 px-4 py-3">
                      <div className="text-[10px] uppercase tracking-[0.16em] text-slate-400 font-bold">Welding complete</div>
                      <div className="mt-2 text-2xl font-black tabular-nums text-fuchsia-300">{tankSummary.totalWeld ? ((tankSummary.actualWeld / tankSummary.totalWeld) * 100).toFixed(1) : '0.0'}%</div>
                      <div className="mt-1 text-xs text-slate-300">of welding scope</div>
                    </div>
                    <div className="rounded-2xl border border-white/10 bg-white/5 px-4 py-3">
                      <div className="text-[10px] uppercase tracking-[0.16em] text-slate-400 font-bold">Erected</div>
                      <div className="mt-2 text-2xl font-black tabular-nums text-cyan-300">{Math.round(tankSummary.actualErect).toLocaleString()}</div>
                      <div className={`mt-1 text-xs ${tankSummary.erectTrend >= 0 ? 'text-emerald-300' : 'text-rose-300'}`}>{tankSummary.erectTrend >= 0 ? 'Above prior week' : 'Below prior week'}</div>
                    </div>
                    <div className="rounded-2xl border border-white/10 bg-white/5 px-4 py-3">
                      <div className="text-[10px] uppercase tracking-[0.16em] text-slate-400 font-bold">Welded</div>
                      <div className="mt-2 text-2xl font-black tabular-nums text-fuchsia-300">{Math.round(tankSummary.actualWeld).toLocaleString()}</div>
                      <div className={`mt-1 text-xs ${tankSummary.weldTrend >= 0 ? 'text-emerald-300' : 'text-rose-300'}`}>{tankSummary.weldTrend >= 0 ? 'Above prior week' : 'Below prior week'}</div>
                    </div>
                    <div className="rounded-2xl border border-white/10 bg-slate-900/55 px-4 py-3 col-span-2">
                      <div className="grid grid-cols-2 gap-3 text-xs">
                        <div>
                          <div className="text-slate-400">Erection remaining</div>
                          <div className="mt-1 font-bold text-amber-300 text-base tabular-nums">{Math.round(tankSummary.remainingErect).toLocaleString()}</div>
                        </div>
                        <div>
                          <div className="text-slate-400">Welding remaining</div>
                          <div className="mt-1 font-bold text-amber-300 text-base tabular-nums">{Math.round(tankSummary.remainingWeld).toLocaleString()}</div>
                        </div>
                      </div>
                      <div className="mt-3 text-xs text-slate-400">Erection total {Math.round(tankSummary.totalErect).toLocaleString()} ton · Welding total {Math.round(tankSummary.totalWeld).toLocaleString()} m</div>
                    </div>
                  </div>
                </div>
              </div>
            </div>
            <div className="grid grid-cols-1 lg:grid-cols-3 gap-6 mb-8">
              <div className="lg:col-span-2 flex flex-col gap-6 break-inside-avoid">
                <div className="bg-white p-2 md:p-6 rounded-xl shadow-sm border border-slate-200">
                  <div className="flex items-center justify-between gap-4 mb-2">
                    <h2 className="text-lg font-bold flex items-center gap-2 text-slate-900"><i data-lucide="activity" style={{ width: 20, height: 20 }} className="text-slate-600" /> Weekly Tonnage vs Welding</h2>
                    <div className="rounded-full border border-slate-200 bg-slate-50 px-3 py-1 text-[11px] font-bold text-slate-600">Last 12 weeks</div>
                  </div>
                  <div className="h-80 pt-1 overflow-x-auto">
                    <div className="min-w-[600px] h-full">
                      <ResponsiveContainer width="99%" minHeight={250} aspect={2}>
                        <ComposedChart data={tankShellData.slice(-12)} margin={{ top: 20, right: 30, left: 20, bottom: 5 }}>
                          <CartesianGrid strokeDasharray="3 3" vertical={false} stroke="#e2e8f0" />
                          <XAxis dataKey="week" tick={{ fontSize: 12 }} stroke="#94a3b8" interval="preserveStartEnd" minTickGap={14} />
                          <YAxis yAxisId="left" orientation="left" stroke="#0891b2" label={{ value: 'Ton', angle: -90, position: 'insideLeft' }} />
                          <YAxis yAxisId="right" orientation="right" stroke="#db2777" label={{ value: 'm', angle: 90, position: 'insideRight' }} />
                          <Tooltip />
                          <Legend wrapperStyle={{ fontSize: '10px' }} />
                          <Bar yAxisId="left" dataKey="erectionTon" name="Wk. Erection (Ton)" fill={COLORS.shellErect} radius={[4, 4, 0, 0]} barSize={30}>
                            <LabelList dataKey="erectionQty" content={<CustomBarLabel />} />
                          </Bar>
                          <Line yAxisId="right" type="monotone" dataKey="weldingM" name="Wk. Welding (m)" stroke={COLORS.shellWeld} strokeWidth={3} dot={{ r: 5 }} />
                        </ComposedChart>
                      </ResponsiveContainer>
                    </div>
                  </div>
                </div>

                <div className="bg-white p-2 md:p-6 rounded-xl shadow-sm border border-slate-200">
                  <div className="flex justify-between items-center mb-4">
                    <h2 className="text-lg font-bold flex items-center gap-2"><i data-lucide="calendar" style={{ width: 20, height: 20 }} className="text-slate-600" /> Monthly Tonnage vs Courses vs Welding</h2>
                    <div className="flex gap-2 text-xs"><span className="px-2 py-1 bg-cyan-50 text-cyan-700 font-bold rounded">Blue: Erection (Ton)</span><span className="px-2 py-1 bg-pink-50 text-pink-700 font-bold rounded">Line: Welding (m)</span></div>
                  </div>
                  <div className="h-80 overflow-x-auto">
                    <div className="min-w-[600px] h-full">
                      <ResponsiveContainer width="99%" minHeight={250} aspect={2}>
                        <ComposedChart data={tankMonthlyData} margin={{ top: 20, right: 30, left: 20, bottom: 25 }}>
                          <CartesianGrid strokeDasharray="3 3" vertical={false} stroke="#e2e8f0" />
                          <XAxis dataKey="month" tick={{ fontSize: 11, fontWeight: 'bold' }} stroke="#94a3b8" interval="preserveStartEnd" minTickGap={14} angle={-45} textAnchor="end" height={40} />
                          <YAxis yAxisId="left" orientation="left" stroke="#0891b2" label={{ value: 'Ton', angle: -90, position: 'insideLeft' }} />
                          <YAxis yAxisId="right" orientation="right" stroke="#db2777" label={{ value: 'm', angle: 90, position: 'insideRight' }} />
                          <Tooltip />
                          <Legend wrapperStyle={{ fontSize: '10px' }} />
                          <Bar yAxisId="left" dataKey="erectionTon" name="Monthly Erection (Ton)" fill={COLORS.shellErect} radius={[4, 4, 0, 0]} barSize={40}>
                            <LabelList dataKey="erectionQty" content={<CustomBarLabel />} />
                          </Bar>
                          <Line yAxisId="right" type="monotone" dataKey="weldingM" name="Monthly Welding (m)" stroke={COLORS.shellWeld} strokeWidth={3} dot={{ r: 6 }} />
                        </ComposedChart>
                      </ResponsiveContainer>
                    </div>
                  </div>
                </div>
              </div>
              <div className="bg-slate-800 text-slate-100 p-6 rounded-xl shadow-lg flex flex-col justify-center h-fit sticky top-4 break-inside-avoid"><h3 className="text-md font-bold text-white border-b border-slate-600 pb-2 mb-4">Overall Status ({tankOverallStatus.dateLabel})</h3><div className="space-y-6"><div><div className="flex justify-between text-sm text-slate-200 mb-1"><span>Shell Course (Qty)</span><span className="text-cyan-400 font-bold">{tankOverallStatus.courseCompleted.toLocaleString()} / {tankOverallStatus.courseTotal.toLocaleString()}</span></div><div className="w-full bg-slate-700 h-2 rounded-full overflow-hidden"><div className="bg-cyan-500 h-full" style={{ width: `${tankOverallStatus.coursePct.toFixed(2)}%` }}></div></div><p className="text-xs text-slate-300 mt-1"><i data-lucide="trending-up" style={{ width: 12, height: 12 }} className="inline mr-1 text-green-400" /> {tankOverallStatus.coursePct.toFixed(2)}% Completed (Rem: {tankOverallStatus.courseRemaining.toLocaleString()})</p></div><div><div className="flex justify-between text-sm text-slate-200 mb-1"><span>Shell Plate Erection (Ton)</span><span className="text-cyan-400 font-bold">{tankOverallStatus.erected.toLocaleString()} / {tankOverallStatus.erectTotal.toLocaleString()}</span></div><div className="w-full bg-slate-700 h-2 rounded-full overflow-hidden"><div className="bg-cyan-500 h-full" style={{ width: `${tankOverallStatus.erectPct.toFixed(2)}%` }}></div></div><p className="text-xs text-slate-300 mt-1"><i data-lucide="trending-up" style={{ width: 12, height: 12 }} className="inline mr-1 text-green-400" /> {tankOverallStatus.erectPct.toFixed(2)}% Completed (Rem: {tankOverallStatus.erectRemaining.toLocaleString()})</p></div><div><div className="flex justify-between text-sm text-slate-200 mb-1"><span>Shell Plate Welding (m)</span><span className="text-pink-400 font-bold">{tankOverallStatus.welded.toLocaleString()} / {tankOverallStatus.weldTotal.toLocaleString()}</span></div><div className="w-full bg-slate-700 h-2 rounded-full overflow-hidden"><div className="bg-pink-500 h-full" style={{ width: `${tankOverallStatus.weldPct.toFixed(2)}%` }}></div></div><p className="text-xs text-slate-300 mt-1"><i data-lucide="trending-up" style={{ width: 12, height: 12 }} className="inline mr-1 text-green-400" /> {tankOverallStatus.weldPct.toFixed(2)}% Completed (Rem: {tankOverallStatus.weldRemaining.toLocaleString()})</p></div><div className="bg-slate-700/50 p-3 rounded border border-yellow-500/30"><span className="text-xs font-bold text-yellow-400 block mb-1">SUMMARY:</span><p className="text-xs text-slate-200">{tankOverallStatus.summaryText}</p></div></div></div>
            </div>

            {/* NEW TANK BOTTOM TRACKER SECTION */}
            <TankBottomTracker />

            {/* 8. PAINTING WORKS */}
            <div id="painting" ref={paintingRef} className="mb-12 mt-4 page-break-before">
              <h2 className="text-xl font-bold text-slate-900">8. Painting Works Report</h2>
              <div className="h-px bg-slate-300 flex-grow"></div>
              <button onClick={scrollToTop} className="no-print flex items-center gap-1 text-xs text-slate-600 hover:text-blue-600 transition-colors">
                <i data-lucide="arrow-up" style={{ width: 14, height: 14 }} /> Back to Cover
              </button>
            </div>
            <div className="break-inside-avoid">
              <PaintingSection />
            </div>

            {/* 9. PIPING (NEW DASHBOARD) */}
            <div id="piping" ref={pipingRef} className="mb-12 mt-4 page-break-before">
              <h2 className="text-xl font-bold text-slate-900">9. Piping & Welding Works</h2>
              <div className="h-px bg-slate-300 flex-grow"></div>
              <button onClick={scrollToTop} className="no-print flex items-center gap-1 text-xs text-slate-600 hover:text-blue-600 transition-colors ml-auto"><i data-lucide="arrow-up" style={{ width: 14, height: 14 }} /> Back to Cover</button>
            </div>
            <div className="break-inside-avoid">
              <PipingSection />
            </div>

          </div>
        </div>
      );
    }



    // RENDER
    const rootElement = document.getElementById('root');
    if (rootElement) {
      const root = ReactDOM.createRoot(rootElement);
      // Wait for React to render elements then initialize lucide
      const initIcons = () => {
         setTimeout(() => {
           if (window.lucide && typeof window.lucide.createIcons === 'function') {
              window.lucide.createIcons();
           }
         }, 100);
      };

      // Simple wrapper context for creating icons after render
      const AppWrapper = () => {
         React.useEffect(() => {
             initIcons();
         }, []); // <-- Fix infinite loop
         return <App />;
      };

      root.render(
        <React.StrictMode>
          <AppWrapper />
        </React.StrictMode>
      );
    }
  </script>
</body>

</html>
