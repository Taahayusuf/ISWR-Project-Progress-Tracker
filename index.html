    const KPICard = ({ title, actual, target, actualMt, targetMt, color, icon, alert = false }) => {

      const remainingWDI = target - actual;

    const GaugeChart = ({ value, label }) => {
      const safeValue = Math.max(0, Math.min(value || 0, 2));

      const formatChartValue = (value) => {
        if (value == null) return '';

          const compact = Math.abs(value) >= 10000 ? (value / 1000).toFixed(0) : (value / 1000).toFixed(1);
          return `${compact.replace('.0', '')}k`;
        }
        return value.toLocaleString();
      };

      const createWeeklyLabelRenderer = (color = '#0f172a') => ({ x, y, width, value }) => {
        if (!value || value <= 0) return null;
        return (
          <text x={x + width / 2} y={y - 8} textAnchor="middle" fill={color} fontSize="10" fontWeight="800">
            {formatChartValue(value)}
          </text>
        );
      };

      const createCumulativeLabelRenderer = (color) => ({ x, y, value, index }) => {
        if (value == null) return null;
        const isLast = index === mergedData.length - 1;
        const shouldShow = isLast || index % 3 === 0;
        if (!shouldShow) return null;

        const label = formatChartValue(Math.round(value));
        const labelWidth = Math.max(30, label.length * 7 + 10);

        return (
          <g>
            <rect x={x - labelWidth / 2} y={y - 22} width={labelWidth} height={16} rx={5} fill="rgba(255,255,255,0.92)" stroke="rgba(148,163,184,0.35)" />

              {label}
            </text>
          </g>
        );
      };

      const reportDateLabel = useMemo(() => {
        const latestPlanDate = pipingPlanRaw.length ? new Date(pipingPlanRaw[pipingPlanRaw.length - 1].date) : new Date('2026-03-13');
        const safeDate = Number.isNaN(latestPlanDate.getTime()) ? new Date('2026-03-13') : latestPlanDate;
        return safeDate.toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' }).toUpperCase();
      }, []);

      const forecastData = useMemo(() => {
        const recentWeeks = pipingWeeklyActuals.slice(-5);
        const avgStation = recentWeeks.length ? recentWeeks.reduce((acc, curr) => acc + curr.station, 0) / recentWeeks.length : 0;
        const avgTank = recentWeeks.length ? recentWeeks.reduce((acc, curr) => acc + curr.tank, 0) / recentWeeks.length : 0;
        const avgPipe = recentWeeks.length ? recentWeeks.reduce((acc, curr) => acc + curr.pipeline, 0) / recentWeeks.length : 0;

        const remStation = Math.max(0, kpiData.station.target - kpiData.station.actual);
        const remTank = Math.max(0, kpiData.tank.target - kpiData.tank.actual);
        const remPipe = Math.max(0, kpiData.pipe.target - kpiData.pipe.actual);

        const weeksStation = avgStation > 0 ? Math.ceil(remStation / avgStation) : 999;
        const weeksTank = avgTank > 0 ? Math.ceil(remTank / avgTank) : 999;
        const weeksPipe = avgPipe > 0 ? Math.ceil(remPipe / avgPipe) : 999;
        const latestTimelineDate = mergedData.length ? new Date(mergedData[mergedData.length - 1].date) : new Date('2026-03-13');
        const currentDate = Number.isNaN(latestTimelineDate.getTime()) ? new Date('2026-03-13') : latestTimelineDate;

        const targetStationDate = new Date('2026-11-30');
        const targetTankDate = new Date('2026-10-30');
        const targetPipeDate = new Date('2026-08-30');

        const getWeeksToTarget = (target) => Math.max(1, Math.ceil((target - currentDate) / (1000 * 60 * 60 * 24 * 7)));

        const reqStation = Math.ceil(remStation / getWeeksToTarget(targetStationDate));
        const reqTank = Math.ceil(remTank / getWeeksToTarget(targetTankDate));
        const reqPipe = Math.ceil(remPipe / getWeeksToTarget(targetPipeDate));

        const getFinishDateStr = (weeks) => {
          if (weeks === 999) return 'Unknown';
          const date = new Date(currentDate.getTime());
          date.setDate(date.getDate() + (weeks * 7));
          return date.toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: '2-digit' });
        };

        return {
          station: { avg: Math.round(avgStation), rem: remStation, weeks: weeksStation, date: getFinishDateStr(weeksStation), targetDate: '30 Nov 26', required: reqStation },
          tank: { avg: Math.round(avgTank), rem: remTank, weeks: weeksTank, date: getFinishDateStr(weeksTank), targetDate: '30 Oct 26', required: reqTank },
          pipe: { avg: Math.round(avgPipe), rem: remPipe, weeks: weeksPipe, date: getFinishDateStr(weeksPipe), targetDate: '30 Aug 26', required: reqPipe }
        };
      }, []);

            <KPICard title="Pipeline" actual={kpiData.pipe.actual} target={kpiData.pipe.target} actualMt={kpiData.pipe.actualMt} targetMt={kpiData.pipe.targetMt} color={COLORS.pipe} icon="arrow-up-right" />

          <div className="mb-4 break-inside-avoid">
            <h3 className="text-xs font-bold text-slate-700 uppercase mb-2 flex items-center gap-1"><i data-lucide="activity" style={{ width: 14, height: 14 }} /> Forecast & Recovery Plan (Based on Last 5 Weeks Velocity)</h3>
            <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
              <ForecastCard title="Station Piping Forecast" avgWdi={forecastData.station.avg} remainingWdi={forecastData.station.rem} finishDate={forecastData.station.date} weeksLeft={forecastData.station.weeks} targetDate={forecastData.station.targetDate} requiredWdi={forecastData.station.required} />
              <ForecastCard title="Tank Piping Forecast" avgWdi={forecastData.tank.avg} remainingWdi={forecastData.tank.rem} finishDate={forecastData.tank.date} weeksLeft={forecastData.tank.weeks} targetDate={forecastData.tank.targetDate} requiredWdi={forecastData.tank.required} />
              <ForecastCard title="Pipeline Forecast" avgWdi={forecastData.pipe.avg} remainingWdi={forecastData.pipe.rem} finishDate={forecastData.pipe.date} weeksLeft={forecastData.pipe.weeks} targetDate={forecastData.pipe.targetDate} requiredWdi={forecastData.pipe.required} />
            </div>
          </div>

          <div className="grid grid-cols-1 md:grid-cols-5 gap-3 h-auto md:min-h-[160px] print:h-auto print:mb-4">
            {pipingBreakdownData.map((data, index) => <MonthCard key={index} data={data} />)}
          </div>

          <div className="mb-8 mt-4 break-inside-avoid">
            <div className="flex items-center justify-between mb-4 border-b border-slate-200 pb-2">
              <div className="flex items-center gap-2"><div className="w-2 h-6 bg-emerald-500 rounded-full print-color-adjust"></div><h2 className="text-lg font-bold text-slate-900 flex items-center gap-2"><i data-lucide="layers" style={{ width: 20, height: 20 }} className="text-emerald-600" />Pipeline Detailed Activity Progress</h2></div>
              <span className="text-xs font-bold bg-emerald-100 text-emerald-800 px-3 py-1 rounded-full uppercase tracking-wider border border-emerald-200">Pipeline Works Only</span>

            <div className="bg-white rounded-lg border border-slate-200 overflow-hidden shadow-sm break-inside-avoid">

                <table className="w-full text-sm text-left">
                  <thead className="text-xs text-slate-700 uppercase bg-slate-50 border-b border-slate-200">
                    <tr><th className="px-3 py-2.5 font-bold text-slate-900">Activity</th><th className="px-3 py-2.5 text-center">Total Qty</th><th className="px-3 py-2.5 text-center text-slate-700">Previous Week</th><th className="px-3 py-2.5 text-center font-bold text-blue-700 bg-blue-50/30">Current Week<br />Progress</th><th className="px-3 py-2.5 text-center text-slate-700">Last Week<br />% Progress</th><th className="px-3 py-2.5 text-center font-bold text-green-700 bg-green-50/30">Current Week<br />% Progress</th><th className="px-3 py-2.5 text-center font-bold text-orange-700 bg-orange-50/30">Remaining<br />QTY</th></tr>
                  </thead>
                  <tbody className="divide-y divide-slate-100">
                    {pipelineActivities.map((row, idx) => (
                      <tr key={idx} className="hover:bg-slate-50 transition-colors">
                        <td className="px-3 py-1.5 font-medium text-slate-900">{row.activity}</td>

              </div>
            </div>
          </div>

          <div className="grid grid-cols-1 gap-8 print:gap-4 print:block">
            {/* CHART 1 */}
            <div className="bg-slate-50 rounded-xl p-3 md:p-5 border border-slate-200 flex flex-col h-[460px] print:h-[320px] print:mb-4 print:bg-white print:border-slate-300 break-inside-avoid shadow-sm">
              <div className="flex flex-col lg:flex-row lg:justify-between lg:items-start gap-3 mb-5">
                <h3 className="font-bold text-slate-900 flex items-center gap-2 text-base leading-snug"><div className="w-2.5 h-2.5 rounded-full bg-blue-600 print-color-adjust"></div> Station Piping (Plan vs Actual) <span className="text-sm font-medium text-slate-700">(WDI)</span></h3>
                <div className="flex flex-wrap items-center gap-x-4 gap-y-2 text-[11px] font-bold text-slate-700"><div className="flex items-center gap-1.5"><div className="w-3 h-3 bg-blue-200 rounded print-color-adjust"></div> Wk. Plan</div><div className="flex items-center gap-1.5"><div className="w-3 h-3 bg-blue-600 rounded print-color-adjust"></div> Wk. Actual</div><div className="flex items-center gap-1.5"><div className="w-5 h-0.5 border-t-2 border-blue-400 border-dashed"></div> Cum. Plan</div><div className="flex items-center gap-1.5"><div className="w-5 h-0.5 bg-blue-800 print-color-adjust"></div> Cum. Actual</div></div>

                <div className="min-w-[760px] h-full">
                  <ResponsiveContainer width="100%" minHeight={330}>
                    <ComposedChart data={mergedData} margin={{ top: 16, right: 26, left: 8, bottom: 28 }}>

                <div className="flex flex-wrap items-center gap-x-4 gap-y-2 text-[11px] font-bold text-slate-700"><div className="flex items-center gap-1.5"><div className="w-3 h-3 bg-violet-200 rounded print-color-adjust"></div> Wk. Plan</div><div className="flex items-center gap-1.5"><div className="w-3 h-3 bg-violet-600 rounded print-color-adjust"></div> Wk. Actual</div><div className="flex items-center gap-1.5"><div className="w-5 h-0.5 border-t-2 border-violet-400 border-dashed"></div> Cum. Plan</div><div className="flex items-center gap-1.5"><div className="w-5 h-0.5 bg-violet-800 print-color-adjust"></div> Cum. Actual</div></div>

    // --- 5. TANK BOTTOM TRACKER COMPONENT ---
    function BottomTankCard({ data }) {
      const c = bottomStatusColor[data.status] || bottomStatusColor.notstarted;
      return (
        <div className={`rounded-xl border p-4 shadow-sm ${c.bg} flex flex-col h-full`}>
          <div className="flex items-center justify-between mb-1">
            <span className="font-bold text-slate-900 text-base">{data.tank}</span>
            <span className={`text-xs font-bold px-2.5 py-1 rounded text-white ${c.badge}`}>{data.pct.toFixed(1)}%</span>
          </div>
          <div className="text-xs font-bold text-slate-600 uppercase mb-2">{data.type}</div>
          <div className="w-full bg-white/60 rounded-full h-2.5 mb-2 border border-white/50">
            <div className={`h-2.5 rounded-full ${c.badge} print-color-adjust`} style={{ width: `${data.pct}%` }} />
          </div>
          <div className="mt-auto space-y-1.5">
            <div className="flex justify-between items-center text-xs font-semibold"><span className={c.text}>✔ {data.completed.toLocaleString()} m</span><span className="text-slate-700">Rem: {data.remain.toLocaleString()}</span></div>
            <div className="text-xs font-bold text-slate-600 border-t border-slate-200/50 pt-1.5 flex justify-between"><span>TARGET:</span><span>{data.total.toLocaleString()} m</span></div>
          </div>
        </div>
      );
    }

    const TankBottomTracker = () => {
      const totalErect = tankBottomSummary.erection.total;
      const actualErect = tankBottomSummary.erection.actual;
      const totalWeld = tankBottomSummary.welding.total;
      const actualWeld = tankBottomSummary.welding.actual;
      const bottomGroups = [
        { title: 'Strategic Tanks (1–12)', color: 'bg-blue-500', tanks: STRATEGIC_TANKS },
        { title: 'Buffer Tanks', color: 'bg-purple-500', tanks: BUFFER_TANKS },
        { title: 'Operational Tanks (A–C)', color: 'bg-green-500', tanks: OPERATIONAL_TANKS }
      ];

      const erectionProgress = (actualErect / totalErect) * 100;
      const weldingProgress = (actualWeld / totalWeld) * 100;

      return (
        <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-4 md:p-6 mb-8">
          <div className="flex flex-col md:flex-row justify-between items-start md:items-center mb-6 gap-4">
            <div>
              <h2 className="text-xl font-bold text-slate-900 flex items-center gap-2">
                <i data-lucide="activity" style={{ width: 24, height: 24 }} className="text-blue-600" />
                Tank Bottom Works Erection vs Welding Progress
              </h2>
            </div>
          </div>

          <div className="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8 break-inside-avoid">
            {/* Erection Card */}
            <div className="bg-slate-50 rounded-lg p-4 border border-slate-200">
              <div className="flex justify-between items-center mb-2">
                <h3 className="font-bold text-slate-900">Total Bottom Erection</h3>
                <span className="text-xs font-bold bg-green-100 text-green-700 px-2 py-1 rounded">On Track</span>
              </div>
              <div className="flex items-end gap-2 mb-2">
                <span className="text-3xl font-bold text-slate-900">{actualErect.toLocaleString()}</span>
                <span className="text-sm text-slate-700 mb-1 font-medium">/ {totalErect.toLocaleString()} Ton</span>
              </div>
              <div className="w-full bg-slate-200 rounded-full h-2.5 overflow-hidden">
                <div className="bg-blue-600 h-full rounded-full" style={{ width: `${erectionProgress}%` }}></div>
              </div>
              <div className="flex justify-between mt-2 text-xs font-medium text-slate-800">
                <span>{erectionProgress.toFixed(1)}% Completed</span>
                <span>Remaining: {(totalErect - actualErect).toLocaleString()} Ton</span>
              </div>
            </div>

            {/* Welding Card */}
            <div className="bg-red-50 rounded-lg p-4 border border-red-200">
              <div className="flex justify-between items-center mb-2">
                <h3 className="font-bold text-red-900">Total Bottom Welding</h3>
                <span className="text-xs font-bold bg-green-100 text-green-700 px-2 py-1 rounded">On Track</span>
              </div>
              <div className="flex items-end gap-2 mb-2">
                <span className="text-3xl font-bold text-red-900">{actualWeld.toLocaleString()}</span>
                <span className="text-sm text-red-800 mb-1 font-medium">/ {totalWeld.toLocaleString()} m</span>
              </div>
              <div className="w-full bg-red-200 rounded-full h-2.5 overflow-hidden">
                <div className="bg-red-600 h-full rounded-full" style={{ width: `${weldingProgress}%` }}></div>
              </div>
              <div className="flex justify-between mt-2 text-xs font-medium text-red-800">
                <span>{weldingProgress.toFixed(1)}% Completed</span>
                <span>Remaining: {(totalWeld - actualWeld).toLocaleString()} m</span>
              </div>
            </div>
          </div>

          <div className="mb-8 break-inside-avoid">
            <h2 className="text-base font-bold text-slate-900 mb-4 flex items-center gap-2"><i data-lucide="clipboard-list" style={{ width: 20, height: 20 }} className="text-slate-600" />Tank-Based Welding Status</h2>
            {bottomGroups.map((group) => (
              <div key={group.title} className="mb-4">
                <h3 className="text-sm font-bold text-slate-700 mb-2 flex items-center gap-2"><span className={`w-2 h-2 rounded-full ${group.color}`}></span>{group.title}</h3>
                <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(180px, 1fr))', gap: '12px' }} className="print:grid-cols-6 break-inside-avoid">
                  {group.tanks.map(t => <BottomTankCard key={t.tank} data={t} />)}
                </div>
              </div>
            ))}
          </div>
        </div>
      );
    };

    // --- PAINTING SECTION COMPONENT ---
    const PaintingSection = () => {
      const totIntBlast = paintingSummary.internalBlasting.total;
      const donIntBlast = paintingSummary.internalBlasting.done;

      const totIntLin = paintingSummary.internalLining.total;
      const donIntLin = paintingSummary.internalLining.done;

      const totExtBlast = paintingSummary.externalBlasting.total;
      const donExtBlast = paintingSummary.externalBlasting.done;

      const totExtCoat = paintingSummary.externalCoating.total;
      const donExtCoat = paintingSummary.externalCoating.done;

      const pct = (d, t) => t > 0 ? (d / t * 100).toFixed(1) : '0.0';

      return (
        <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-6 mb-8">
          {/* HEADER */}
          <div className="flex flex-col md:flex-row justify-between items-start md:items-center mb-6 border-b border-slate-200 pb-4">
            <div>
              <h2 className="text-xl font-bold text-slate-900">Painting Works Report</h2>
            </div>
          </div>

          {/* OVERALL PROGRESS SUMMARY */}
          <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 mb-8 break-inside-avoid">
            {[
              { title: "Internal Blasting", done: donIntBlast, total: totIntBlast, color: "blue" },
              { title: "Internal Lining", done: donIntLin, total: totIntLin, color: "indigo" },
              { title: "External Blasting", done: donExtBlast, total: totExtBlast, color: "emerald" },
              { title: "External Coating", done: donExtCoat, total: totExtCoat, color: "teal" }
            ].map((metric, i) => {
              const p = parseFloat(pct(metric.done, metric.total));
              const radius = 30; // Reduced from 38
              const circum = 2 * Math.PI * radius;
              const offset = circum - (p / 100) * circum;
              const colorClass = `text-${metric.color}-600`;
              const bgClass = `text-${metric.color}-100`;

              return (
                <div key={i} className="bg-white rounded-xl shadow-sm border border-slate-200 p-3 flex flex-col items-center justify-center relative overflow-hidden transition-all hover:shadow-md hover:border-slate-300">
                  <div className="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-transparent via-slate-200 to-transparent opacity-50"></div>
                  <h3 className="text-sm font-bold text-slate-600 uppercase tracking-wider mb-2 text-center">{metric.title}</h3>
                  
                  <div className="relative flex items-center justify-center mb-3">
                    <svg className="w-20 h-20 transform -rotate-90">
                      <circle cx="40" cy="40" r={radius} stroke="currentColor" strokeWidth="5" fill="transparent" className={bgClass} />
                      <circle cx="40" cy="40" r={radius} stroke="currentColor" strokeWidth="5" fill="transparent" strokeDasharray={circum} strokeDashoffset={offset} className={`${colorClass} transition-all duration-1000 ease-out`} strokeLinecap="round" />
                    </svg>
                    <div className="absolute flex flex-col items-center justify-center text-center">
                      <span className={`text-2xl font-black ${colorClass}`}>{p.toFixed(0)}</span>
                      <span className="text-xs font-medium text-slate-500 -mt-1">%</span>
                    </div>
                  </div>

                  <div className="w-full grid grid-cols-3 gap-1">
                    <div className="flex flex-col items-center border-r border-slate-200">
                      <span className="text-xs text-slate-500 font-bold font-mono uppercase pb-0.5">Total</span>
                      <span className="text-sm font-black text-slate-800">{metric.total.toLocaleString()}</span>
                    </div>
                    <div className="flex flex-col items-center border-r border-slate-200">
                      <span className="text-xs text-green-600 font-bold font-mono uppercase pb-0.5">Done</span>
                      <span className="text-sm font-black text-green-700">{metric.done.toLocaleString()}</span>
                    </div>
                    <div className="flex flex-col items-center">
                      <span className="text-xs text-red-500 font-bold font-mono uppercase pb-0.5">Remain</span>
                      <span className="text-sm font-black text-red-600">{(metric.total - metric.done).toLocaleString()}</span>
                    </div>
                  </div>
                </div>
              );
            })}
          </div>

          {/* TANK-BY-TANK VISUAL ANALYTICS */}
          <div className="mb-8">
            <h3 className="text-base font-bold text-slate-900 mb-4 flex items-center gap-2 border-b border-slate-100 pb-2">
              <span className="bg-slate-800 text-white w-6 h-6 rounded flex items-center justify-center text-sm">📊</span> 
              Tank Painting Analytics Overview
            </h3>

            <div className="space-y-6 break-inside-avoid">
              {[{ name: "Strategic Tanks", tanks: paintingTanks.filter(t => t.name.startsWith("TANK-") && !isNaN(t.name.split("-")[1])), tagColor: "bg-blue-500" },
                { name: "Operational Tanks", tanks: paintingTanks.filter(t => ["TANK-A", "TANK-B", "TANK-C"].includes(t.name)), tagColor: "bg-emerald-500" },
                { name: "Buffer Tanks", tanks: paintingTanks.filter(t => t.name.includes("BUFFER")), tagColor: "bg-purple-500" }
              ].map(group => (
                <div key={group.name} className="animate-fade-in">
                  <div className="flex items-center gap-2 mb-3">
                    <span className={`w-3 h-3 rounded-full ${group.tagColor}`}></span>
                    <h4 className="text-sm font-black text-slate-800 uppercase tracking-widest">{group.name}</h4>
                  </div>
                  
                  <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-3 print:grid-cols-3 break-inside-avoid">
                    {group.tanks.map((t, idx) => {
                      const buildBar = (label, done, total, colorBase) => {
                        const prog = total > 0 ? (done / total * 100) : 0;
                        return (
                          <div className="mb-1.5 last:mb-0">
                            <div className="flex justify-between items-end mb-0.5">
                              <span className="text-xs font-bold text-slate-700">{label}</span>
                              <span className="text-[10px] font-bold text-slate-500">{done.toLocaleString()} <span className="text-slate-300">/</span> {total.toLocaleString()}</span>
                            </div>
                            <div className="w-full bg-slate-200 rounded-full h-[8px] relative overflow-hidden">
                              <div className={`absolute top-0 left-0 h-full rounded-full bg-${colorBase}-500 transition-all duration-700`} style={{ width: `${Math.max(prog, 0)}%` }}></div>
                              {prog >= 100 && <div className="absolute top-0 left-0 w-full h-full bg-white opacity-20"></div>}
                            </div>
                            <div className="text-[10px] text-right font-black mt-0.5 text-slate-500 leading-none">{prog.toFixed(0)}%</div>
                          </div>
                        );
                      };

                      return (
                        <div key={idx} className={`bg-white rounded-lg border p-3 shadow-sm hover:shadow-md transition-shadow relative overflow-hidden ${t.status === 'critical' ? 'border-red-300' : 'border-slate-200'}`}>
                          {t.status === 'critical' && <div className="absolute top-0 right-0 w-8 h-8 flex items-start justify-end p-1 overflow-hidden" title="Requires Attention"><div className="bg-red-500 rotate-45 transform translate-x-[4px] -translate-y-[12px] w-8 h-8 absolute"></div></div>}
                          
                          <div className="flex justify-between items-start mb-2 border-b border-slate-100 pb-2">
                            <div>
                              <div className="font-extrabold text-slate-900 text-base tracking-tight leading-tight">{t.name}</div>
                              <div className="text-[10px] uppercase tracking-wider text-slate-500 font-bold mt-0.5">{group.name === 'Buffer Tanks' ? '16,000 m³' : (group.name === 'Operational Tanks' ? '167,000 m³' : '181,870 m³')}</div>
                            </div>
                            <span className={`text-[10px] font-bold px-2 py-0.5 rounded uppercase tracking-wider ${
                              t.status === 'critical' ? 'bg-red-100 text-red-700' : t.status === 'notstarted' ? 'bg-slate-100 text-slate-600' : 'bg-green-100 text-green-800'
                            }`}>
                              {t.status === 'critical' ? 'Critical' : t.status === 'notstarted' ? 'Not St.' : 'Active'}
                            </span>
                          </div>

                          <div className="space-y-0.5">
                            {buildBar('Int. Blast', t.intBlastDone, t.intBlastTotal, 'blue')}
                            {buildBar('Int. Line', t.intLinDone, t.intLinTotal, 'indigo')}
                            {buildBar('Ext. Blast', t.extBlastDone, t.extBlastTotal, 'emerald')}
                            {buildBar('Ext. Coat', t.extCoatDone, t.extCoatTotal, 'teal')}
                          </div>
                        </div>
                      )
                    })}
                  </div>
                </div>
              ))}
            </div>
          </div>

          {/* CHARTS */}
          <div className="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-8">
            <div className="border border-slate-200 rounded-lg p-4 break-inside-avoid">
              <h4 className="text-sm font-bold text-slate-900 mb-4">Internal Coating Progress</h4>
              <div className="h-[250px]">
                <ResponsiveContainer width="99%" minHeight={250} aspect={2}>

>Tonnage erection is leading at 89.09%. Welding follows at 81.84%. Progress continues steadily.</p></div></div></div>
            </div>

            {/* NEW TANK BOTTOM TRACKER SECTION */}
            <TankBottomTracker />

            {/* 8. PAINTING WORKS */}

    }



    // RENDER
    const rootElement = document.getElementById('root');
    if (rootElement) {
      const root = ReactDOM.createRoot(rootElement);
      // Wait for React to render elements then initialize lucide
      const initIcons = () => {
         setTimeout(() => {
           if (window.lucide && typeof window.lucide.createIcons === 'function') {
              window.lucide.createIcons();
           }
         }, 100);
      };

      // Simple wrapper context for creating icons after render
      const AppWrapper = () => {
         React.useEffect(() => {
             initIcons();
         }, []); // <-- Fix infinite loop
         return <App />;
      };

      root.render(
        <React.StrictMode>
          <AppWrapper />
        </React.StrictMode>
      );
    }
  </script>
